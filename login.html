<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід / Реєстрація — AlarmX</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="about.html">⏰ AlarmX</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="about.html">Про додаток</a></li>
                <li class="nav-item" id="navLogin"><a class="nav-link active" href="login.html">Вхід / Реєстрація</a></li>
                <li class="nav-item" id="navProfile" style="display:none"><a class="nav-link" href="profile.html">Профіль</a></li>
                <li class="nav-item"><a class="nav-link" href="index.html">Будильники</a></li>
                <li class="nav-item" id="navLogout" style="display:none"><a class="nav-link" href="#">Вийти</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4">

                <ul class="nav nav-tabs mb-4">
                    <li class="nav-item">
                        <button class="nav-link active" id="loginTab" onclick="showTab('login')">Вхід</button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" id="registerTab" onclick="showTab('register')">Реєстрація</button>
                    </li>
                </ul>

                <form id="loginForm">
                    <div id="loginMsg" class="alert" style="display:none"></div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" id="loginEmail" placeholder="example@mail.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Пароль</label>
                        <input type="password" class="form-control" id="loginPassword" placeholder="Ваш пароль" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">Увійти</button>
                    </div>
                </form>

                <form id="registerForm" style="display: none;">
                    <div id="registerMsg" class="alert" style="display:none"></div>
                    <div class="mb-3">
                        <label class="form-label">Ім'я</label>
                        <input type="text" class="form-control" id="regName" placeholder="Введіть ваше ім'я" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" id="regEmail" placeholder="example@mail.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Стать</label>
                        <select class="form-select" id="regGender" required>
                            <option value="" disabled selected>Оберіть стать</option>
                            <option value="Чоловіча">Чоловіча</option>
                            <option value="Жіноча">Жіноча</option>
                            <option value="Не вказувати">Не вказувати</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Дата народження</label>
                        <input type="date" class="form-control" id="regBirth" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Пароль</label>
                        <input type="password" class="form-control" id="regPassword" placeholder="Мінімум 8 символів" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">Зареєструватись</button>
                    </div>
                </form>

            </div>
        </div>
    </div>
</div>

<footer>
    <p class="mb-0 text-center">AlarmX &copy; 2025</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/storage.js"></script>
<script src="js/nav.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
