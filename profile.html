<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профіль — AlarmX</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="about.html">⏰ AlarmX</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="about.html">Про додаток</a></li>
                <li class="nav-item" id="navLogin"><a class="nav-link" href="login.html">Вхід / Реєстрація</a></li>
                <li class="nav-item" id="navProfile" style="display:none"><a class="nav-link active" href="profile.html">Профіль</a></li>
                <li class="nav-item"><a class="nav-link" href="index.html">Будильники</a></li>
                <li class="nav-item" id="navLogout" style="display:none"><a class="nav-link" href="#">Вийти</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card p-4">
                <h3 class="mb-4 text-center">Профіль користувача</h3>
                <table class="table table-bordered">
                    <tbody>
                        <tr>
                            <th class="bg-light" style="width: 35%">Ім'я</th>
                            <td id="profileName">—</td>
                        </tr>
                        <tr>
                            <th class="bg-light">Email</th>
                            <td id="profileEmail">—</td>
                        </tr>
                        <tr>
                            <th class="bg-light">Стать</th>
                            <td id="profileGender">—</td>
                        </tr>
                        <tr>
                            <th class="bg-light">Дата народження</th>
                            <td id="profileBirth">—</td>
                        </tr>
                        <tr>
                            <th class="bg-light">Дата реєстрації</th>
                            <td id="profileRegistered">—</td>
                        </tr>
                        <tr>
                            <th class="bg-light">Кількість будильників</th>
                            <td id="profileAlarms">0</td>
                        </tr>
                    </tbody>
                </table>
                <div class="d-flex gap-2 mt-2">
                    <a href="index.html" class="btn btn-primary">До будильників</a>
                    <a href="login.html" id="profileLogout" class="btn btn-outline-secondary">Вийти</a>
                </div>
            </div>
        </div>
    </div>
</div>

<footer>
    <p class="mb-0">AlarmX &copy; 2025</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/storage.js"></script>
<script src="js/nav.js"></script>
<script src="js/profile.js"></script>
<script>
    document.getElementById('profileLogout').addEventListener('click', function (e) {
        e.preventDefault();
        Storage.clearSession();
        window.location.href = 'login.html';
    });
</script>
</body>
</html>
