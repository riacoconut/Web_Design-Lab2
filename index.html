<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Будильники — AlarmX</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="about.html">⏰ AlarmX</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="about.html">Про додаток</a></li>
                <li class="nav-item" id="navLogin"><a class="nav-link" href="login.html">Вхід / Реєстрація</a></li>
                <li class="nav-item" id="navProfile" style="display:none"><a class="nav-link" href="profile.html">Профіль</a></li>
                <li class="nav-item"><a class="nav-link active" href="index.html">Будильники</a></li>
                <li class="nav-item" id="navLogout" style="display:none"><a class="nav-link" href="#">Вийти</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <div class="text-center mb-4">
        <h1 id="clock">00:00:00</h1>
        <p id="clock-date" class="text-muted"></p>
    </div>

    <div class="card p-4 mb-4">
        <h5 class="mb-3">Додати будильник</h5>
        <div class="row g-3">
            <div class="col-md-4">
                <label class="form-label">Час</label>
                <input type="time" class="form-control" id="inputTime">
            </div>
            <div class="col-md-5">
                <label class="form-label">Назва</label>
                <input type="text" class="form-control" id="inputLabel" placeholder="Наприклад: Прокидатись">
            </div>
            <div class="col-md-3 d-flex align-items-end">
                <button class="btn btn-primary w-100" id="addBtn">Додати</button>
            </div>
        </div>
    </div>

    <div id="alarmList"></div>

</div>

<footer>
    <p class="mb-0">AlarmX &copy; 2025</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/storage.js"></script>
<script src="js/nav.js"></script>
<script src="js/alarms-model.js"></script>
<script src="js/alarms-view.js"></script>
<script src="js/alarms-controller.js"></script>
<script src="js/app.js"></script>
</body>
</html>
